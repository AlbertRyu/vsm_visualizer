name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python web/build_web.py
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: vsm_visualizer.html
      - name: Prepare Pages artifact
        run: mkdir _site && cp vsm_visualizer.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  build:
    if: false
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: vsm_visualizer.app
            artifact_path: dist/vsm_visualizer.app
            zip_name: vsm_visualizer_macOS.zip
          - os: windows-latest
            artifact_name: vsm_visualizer.exe
            artifact_path: dist/vsm_visualizer.exe
            zip_name: vsm_visualizer_Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Nuitka downloads & ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          uv run nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-name="VSM Visualizer" \
            --macos-app-icon=src/vsm_visualizer/assets/vsm_logo.ico \
            --include-package=vsm_visualizer \
            --include-data-dir=src/vsm_visualizer/assets=assets \
            --include-package=dearpygui \
            --include-package=dearpygui_ext \
            --python-flag=no_site \
            --output-filename=vsm_visualizer \
            --output-dir=dist \
            --assume-yes-for-downloads \
            app.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run nuitka \
            --onefile \
            --windows-icon-from-ico=src/vsm_visualizer/assets/vsm_logo.ico \
            --include-package=vsm_visualizer \
            --include-data-dir=src/vsm_visualizer/assets=assets \
            --include-package=dearpygui \
            --include-package=dearpygui_ext \
            --python-flag=no_site \
            --output-filename=vsm_visualizer \
            --output-dir=dist \
            --assume-yes-for-downloads \
            app.py

      - name: Rename app bundle (macOS)
        if: runner.os == 'macOS'
        run: mv dist/app.app dist/vsm_visualizer.app

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/vsm_visualizer.app "${{ matrix.zip_name }}"

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "${{ matrix.zip_name }}"

      - name: Zip example data (macOS only)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent example_data example_data.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.zip_name }}
            ${{ runner.os == 'macOS' && 'example_data.zip' || '' }}
